<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Pixel Solution</title>
    <link rel="stylesheet" href="/src/css/home.css" />
    <style>
      .contact-header {
        padding: 150px 0 80px 0;
        background: var(--color-bg);
        text-align: center;
      }
      .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: var(--spacing-2xl);
        align-items: start;
        margin-top: var(--spacing-xl);
      }
      @media (max-width: 992px) {
        .contact-grid {
          grid-template-columns: 1fr;
        }
      }
      .contact-info-card {
        background: var(--color-surface);
        padding: var(--spacing-lg);
        border-radius: var(--radius-lg);
        border: 1px solid var(--color-border);
        box-shadow: var(--shadow-sm);
        transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      }
      .contact-info-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-md);
        border-color: var(--color-primary);
      }
      .info-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: var(--spacing-md);
      }
      .info-icon {
        width: 48px;
        height: 48px;
        background: rgba(var(--color-primary-rgb), 0.1);
        color: var(--color-primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: var(--spacing-sm);
        flex-shrink: 0;
      }
      .info-content h3 {
        margin-bottom: 0.2rem;
        font-size: 1.2rem;
      }
      .info-content p, .info-content a {
        color: var(--color-text-muted);
        text-decoration: none;
        transition: color var(--transition-fast);
        line-height: 1.5;
      }
      .info-content a:hover {
        color: var(--color-primary);
      }
      /* Modern Form Styling */
      .contact-form {
        background: var(--color-surface);
        padding: var(--spacing-xl);
        border-radius: var(--radius-lg);
        border: 1px solid var(--color-border);
        box-shadow: var(--shadow-md);
      }
      .form-group {
        margin-bottom: var(--spacing-md);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-md);
      }
      @media (max-width: 768px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }
      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--color-text);
      }
      .form-control {
        width: 100%;
        padding: 0.8rem 1rem;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        color: var(--color-text);
        font-family: var(--font-body);
        transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      }
      .form-control:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb), 0.2);
      }
      textarea.form-control {
        min-height: 150px;
        resize: vertical;
      }
      .submit-btn {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <!-- Header Section -->
      <section class="contact-header hidden-reveal">
        <div class="container">
          <span class="subheading">Contact Us</span>
          <h1 class="kinetic-text mb-2">Get In <span class="text-gradient">Touch With Us!</span></h1>
          <p class="lead" style="margin: 0 auto; max-width: 600px; color: var(--color-text-muted);">Ready to scale? Let's discuss how our digital solutions can propel your business growth.</p>
        </div>
      </section>

      <!-- Contact Info & Form -->
      <section class="section">
        <div class="container hidden-reveal">
          <div class="contact-grid">
            
            <!-- Left: Contact Info -->
            <div class="contact-info-sidebar">
              <div class="contact-info-card mb-4">
                <div class="info-item">
                  <div class="info-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                  </div>
                  <div class="info-content">
                    <h3>Location</h3>
                    <p>Garia, South Kolkata,<br>Kolkata 700084</p>
                  </div>
                </div>
              </div>
              
              <div class="contact-info-card mb-4">
                <div class="info-item">
                  <div class="info-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                  </div>
                  <div class="info-content">
                    <h3>Email</h3>
                    <a href="mailto:info@pixelsolution.in">info@pixelsolution.in</a>
                  </div>
                </div>
              </div>

              <div class="contact-info-card mb-4">
                <div class="info-item">
                  <div class="info-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                  </div>
                  <div class="info-content">
                    <h3>Phone</h3>
                    <a href="tel:+918240017974">+91 8240017974</a>
                  </div>
                </div>
              </div>

              <div class="contact-info-card">
                <div class="info-item">
                  <div class="info-icon" style="background: rgba(var(--color-accent-rgb), 0.1); color: var(--color-accent);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
                  </div>
                  <div class="info-content">
                    <h3>Follow Us</h3>
                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                      <a href="https://www.instagram.com/pixelsolutiondigitalmarketing/" target="_blank" style="color: var(--color-text); transition: color var(--transition-fast);" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--color-text)'"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
                      <a href="https://www.facebook.com/profile.php?id=61557723166922" target="_blank" style="color: var(--color-text); transition: color var(--transition-fast);" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--color-text)'"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg></a>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right: Contact Form -->
            <div class="contact-form-wrapper">
              <form class="contact-form" action="#" method="POST">
                <h3 class="mb-3">Send us a message</h3>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" placeholder="John" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" placeholder="Doe" required>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" placeholder="+91 00000 00000">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">How can we help you?</label>
                  <textarea class="form-control" placeholder="Tell us about your project or business goals..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary submit-btn">Submit Request</button>
              </form>
            </div>

          </div>
        </div>
      </section>

    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
